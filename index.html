<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login Clone</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left-section">

        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram Logo">
        </div>

        <h1>
            See everyday moments from <br>
            your <span>close friends.</span>
        </h1>

        <div class="image-box">
            <img src="-erGonz07kB.webp" alt="Friends">
        </div>

    </div>

    <!-- Right Side -->
    <div class="right-section">

        <div class="login-box">

            <h2>Log into Instagram</h2>

            <input type="text" placeholder="Mobile number, username or email">

            <input type="password" placeholder="Password">

            <button class="login-btn">Log in</button>

            <a href="#" class="forgot">Forgot password?</a>

            <button class="facebook-btn">
                <i class="fa-brands fa-facebook-f"></i>
                Log in with Facebook
            </button>

            <button class="create-btn">
                Create new account
            </button>

            <div class="meta">
                <i class="fa-solid fa-infinity"></i>
                Meta
            </div>

        </div>

    </div>

</div>

</body>
</html>
